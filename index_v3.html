<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Wife Kaushi ❤️ V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;overflow:hidden;font-family:Arial,sans-serif}
#rain{position:fixed;inset:0;z-index:-1}
.line{position:absolute;top:-150px;width:3px;background:linear-gradient(transparent,#ff4da6,#ff99cc);animation:fall linear infinite}
@keyframes fall{to{transform:translateY(120vh)}}
.page{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
.hidden{display:none}
.count{font-size:120px;color:#ff69b4;text-shadow:0 0 30px #ff69b4}
.word{font-size:58px;color:#ff7cc7;text-shadow:0 0 20px #ff4da6;margin:8px;animation:zoom 1s}
@keyframes zoom{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
#gif img{width:280px;border-radius:20px}
.progressWrap{width:300px;height:10px;background:#333;border-radius:20px;margin-bottom:20px}
.progress{width:100%;height:100%;background:#ff4da6;border-radius:20px}
.envelopeWrap{display:flex;flex-direction:column;align-items:center}
.envelope{
width:340px;height:230px;position:relative;cursor:pointer;
animation:showUp 1s ease;
}
@keyframes showUp{
from{transform:translateY(100px) scale(.5);opacity:0}
to{transform:translateY(0) scale(1);opacity:1}
}
.body{
position:absolute;bottom:0;
width:100%;height:180px;
background:#ffe4ef;border-radius:0 0 15px 15px;
}
.flap{
position:absolute;top:0;
width:0;height:0;
border-left:170px solid transparent;
border-right:170px solid transparent;
border-top:120px solid #ffc6df;
transform-origin:top;
transition:1s;
z-index:3;
}
.letter{
position:absolute;
left:20px;
top:40px;
width:300px;
height:160px;
background:#fff;
color:#000;
padding:15px;
border-radius:10px;
transition:1s;
z-index:2;
overflow:auto;
}
.seal{
position:absolute;
left:50%;
top:95px;
transform:translateX(-50%);
width:55px;height:55px;
background:#ff4da6;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
z-index:4;
box-shadow:0 0 20px #ff4da6;
}
.open .flap{transform:rotateX(180deg)}
.open .letter{transform:translateY(-120px)}
.gallery{
background:radial-gradient(circle,#1a1a1a,#000);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.photos{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.photos img{
width:220px;height:280px;object-fit:cover;
border-radius:20px;
box-shadow:0 0 20px #ff4da6;
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<div id="rain"></div>

<section id="countPage" class="page">
<div class="count">3</div>
</section>

<section id="textPage" class="page hidden">
<div class="word">HAPPY</div>
<div class="word">BIRTHDAY</div>
<div class="word">MY WIFE KAUSHI ❤️</div>
</section>

<section id="gif" class="page hidden">
<img src="birthday.gif">
</section>

<section id="letterPage" class="page hidden">
<div class="progressWrap"><div class="progress"></div></div>

<div class="envelopeWrap">
<div class="envelope" id="env">
<div class="seal">❤️</div>
<div class="flap"></div>
<div class="letter">
<h2>Happy Birthday My Wife ❤️</h2><br>
<p>
You are the most beautiful part of my life.
Thank you for every smile, every memory and every moment.
I love you forever and always. ❤️
</p>
</div>
<div class="body"></div>
</div>
</div>
</section>

<section id="gallery" class="gallery hidden">
<h1 style="color:#ff7cc7;margin-bottom:20px">Our Memories ❤️</h1>
<div class="photos">
<img src="photo1.jpg">
<img src="photo2.jpg">
</div>
</section>

<script>
for(let i=0;i<150;i++){
 let d=document.createElement('div');
 d.className='line';
 d.style.left=Math.random()*100+'%';
 d.style.height=(60+Math.random()*200)+'px';
 d.style.animationDuration=(1+Math.random()*2)+'s';
 rain.appendChild(d);
}

let n=3;
let el=document.querySelector('.count');

let t=setInterval(()=>{
 n--;
 if(n>0){el.textContent=n;}
 else{
 clearInterval(t);
 countPage.classList.add('hidden');
 textPage.classList.remove('hidden');

 setTimeout(()=>{
  textPage.classList.add('hidden');
  gif.classList.remove('hidden');

  setTimeout(()=>{
   gif.classList.add('hidden');
   letterPage.classList.remove('hidden');
  },5000);

 },3500);
 }
},1000);

document.getElementById('env').onclick=function(){
 this.classList.add('open');

 setTimeout(()=>{
   letterPage.classList.add('hidden');
   gallery.classList.remove('hidden');
 },3000);
}
</script>

</body>
</html>
